# Redis configuration for Murder Boot Application
# 绑定地址
bind 0.0.0.0

# 保护模式关闭（在Docker网络中使用）
protected-mode no

# 端口
port 6380

# TCP连接队列
tcp-backlog 511

# 超时时间
timeout 0

# TCP keepalive
tcp-keepalive 300

# 守护进程模式关闭（Docker中使用）
daemonize no

# 持久化配置
# RDB
save 900 1
save 300 10
save 60 10000

# AOF
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 最大内存设置（根据需要调整）
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志级别
loglevel notice

# 数据库数量
databases 16
