# ============================================
# 生产环境配置
# ============================================

server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://your-prod-host:3306/murder?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true
    username: prod_user
    password: prod_password
  
  data:
    redis:
      host: your-redis-host
      port: 6379
      password: your-redis-password

# 日志级别
logging:
  level:
    com.murder: info
    com.murder.mapper: warn
  file:
    name: /var/log/murder-boot/application.log
