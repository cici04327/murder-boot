

# 开发环境配置
# ============================================

server:
  port: 8080

# 文件上传配置
file:
  upload:
    path: ./uploads
    base-url: http://localhost:8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/murder?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
  
  data:
    redis:
      host: localhost
      port: 6379
      database: 1  # 使用 database 1，与 Spring Cloud 隔离

# 日志级别
logging:
  level:
    com.murder: debug
    com.murder.mapper: debug

alipay:
  app-id: ${ALIPAY_APP_ID:}
  private-key: ${ALIPAY_PRIVATE_KEY:}
  public-key: ${ALIPAY_PUBLIC_KEY:}
  gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi.alipaydev.com/gateway.do}
  notify-url: ${ALIPAY_NOTIFY_URL:http://localhost:8080/api/reservation/payment/notify}
  return-url: ${ALIPAY_RETURN_URL:http://localhost:8080/api/reservation/payment/return}
  result-url: ${ALIPAY_RESULT_URL:http://localhost:3001/payment/result}
  mock-payment: ${ALIPAY_MOCK_PAYMENT:true}
