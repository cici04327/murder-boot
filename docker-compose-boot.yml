version: '3.8'

services:
  # Redis for Murder Boot Application
  redis-boot:
    image: redis:7-alpine
    container_name: murder-boot-redis
    restart: always
    ports:
      - "6380:6379"  # 使用不同的宿主机端口避免冲突
    volumes:
      - redis-boot-data:/data
      - ./redis-boot.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes
    environment:
      - TZ=Asia/Shanghai
    networks:
      - murder-boot-network

  # Redis Commander for Murder Boot (可选的管理界面)
  redis-commander-boot:
    image: rediscommander/redis-commander:latest
    container_name: murder-boot-redis-commander
    restart: always
    ports:
      - "8089:8081"  # 使用不同的端口避免冲突
    environment:
      - REDIS_HOSTS=local:redis-boot:6379
      - TZ=Asia/Shanghai
    depends_on:
      - redis-boot
    networks:
      - murder-boot-network

volumes:
  redis-boot-data:
    driver: local

networks:
  murder-boot-network:
    driver: bridge
